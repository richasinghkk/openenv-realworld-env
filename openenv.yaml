name: openenv-realworld-env

description: >
  A real-world task simulation environment
  that simulates email triage, data cleaning,
  and code review tasks.

version: 1.0

author: Your Name

tasks:

  - name: email_triage
    difficulty: easy
    description: Classify emails into spam, normal, or urgent.

  - name: data_cleaning
    difficulty: medium
    description: Fix incorrect structured data entries.

  - name: code_review
    difficulty: hard
    description: Fix indentation errors in Python code.

observation_space:

  task_id:
    type: integer

  input_data:
    type: string

action_space:

  response:
    type: string

reward:

  type: float
  range: [-0.2, 1.0]