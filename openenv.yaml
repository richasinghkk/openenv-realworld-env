name: openenv-realworld-env

description: >
  A real-world task simulation environment
  including email triage, data cleaning,
  and code review tasks.

version: 1.0

tasks:

  - name: email_triage
    difficulty: easy
    description: Classify email into spam or not.

  - name: data_cleaning
    difficulty: medium
    description: Fix incorrect data entries.

  - name: code_review
    difficulty: hard
    description: Fix indentation errors in code.

action_space:
  type: string
  description: Agent response text

observation_space:
  task_id: integer
  input_data: string